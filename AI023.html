<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4分割テンプレート</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            font-family: sans-serif;
        }

        .container {
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 50% 50%;
            width: 100vw;
            height: 100vh;
        }

        .pane {
            border: 1px solid #ccc;
            box-sizing: border-box;
            overflow: auto;
            padding: 10px;
        }

        .pane iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, auto);
                /* 各行の高さは自動調整 */
                min-height: 50vh;
                /* ビューポート高さの50%を最低確保 */
                height: auto;
                /* 内容に応じて伸びる */
            }
        }

        /* パネルごとの背景色 */
        #top-left {
            background-color: #fce4ec;
        }

        #top-right {
            background-color: #e3f2fd;
        }

        #bottom-left {
            background-color: #e8f5e9;
        }

        #bottom-right {
            background-color: #fff3e0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="pane" id="top-left">
            <!-- 左上 ここから -->
            <div class="pane" id="top-left">
                <h2>大分県 防災情報</h2>
                <ul id="rss-list"></ul>

                <script>
                    (function () {
                        const RSS_URL = "https://www.pref.oita.jp/rss/10/list13.xml"
                        const API = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(RSS_URL);

                        fetch(API)
                            .then(res => res.json())
                            .then(data => {
                                const list = document.getElementById("rss-list");

                                if (!data.items) {
                                    list.innerHTML = "<li>取得失敗</li>";
                                    return;
                                }

                                data.items.slice(0, 5).forEach(item => {
                                    const li = document.createElement("li");
                                    li.innerHTML = `
              <a href="${item.link}" target="_blank">
                ${item.title}
              </a>
              <br>
              <small>${new Date(item.pubDate).toLocaleString()}</small>
            `;
                                    list.appendChild(li);
                                });
                            })
                            .catch(() => {
                                document.getElementById("rss-list").innerHTML =
                                    "<li>読み込みエラー</li>";
                            });
                    })();
                </script>
            </div>
            <!-- 左上 ここまで -->
        </div>
        <div class="pane" id="top-right">
            <!-- 右上 ここから -->
            <h2>花火</h2>
            <div id="p5-fireworks-bl" style="width:100%; height:calc(100% - 40px);"></div>
            <!-- p5本体 -->
            <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>

            <script>
                (function () {
                    new p5((p) => {
                        let fireworks = [];

                        class Firework {
                            constructor(type = null) {
                                this.x = p.random(p.width);
                                this.y = p.height;
                                this.targetY = p.random(p.height / 4, p.height / 2);
                                this.exploded = false;
                                this.particles = [];
                                const allColors = [
                                    p.color(255, 0, 0),       // 赤
                                    p.color(0, 0, 255),       // 青
                                    p.color(0, 255, 0),       // 緑
                                    p.color(255, 255, 0),     // 黄
                                    p.color(128, 0, 128),     // 紫
                                    p.color(255, 192, 203),   // ピンク
                                    p.color(0, 255, 255),     // 水色
                                    p.color(255, 165, 0),     // オレンジ
                                    p.color(255, 0, 255)      // マゼンタ
                                ];
                                // この花火の粒ごとに使う色をランダムで3〜5色選択
                                this.colors = [];
                                const nColors = p.floor(p.random(3, 6));
                                for (let i = 0; i < nColors; i++) {
                                    this.colors.push(allColors[p.floor(p.random(allColors.length))]);
                                }

                                this.type = type || "drop";
                            }

                            update() {
                                if (!this.exploded) {
                                    this.y -= 6 + p.random(0, 3);
                                    if (this.y <= this.targetY) {
                                        this.exploded = true;
                                        if (this.type === "drop") this.createDrop();
                                        else if (this.type === "smile") this.createSmile();
                                        else if (this.type === "pien") this.createPien();
                                        else if (this.type === "bigCircle") this.createBigCircle();
                                    }
                                } else {
                                    this.particles.forEach(pt => pt.update());
                                    this.particles = this.particles.filter(pt => pt.alpha > 0);
                                }
                            }

                            show() {
                                if (!this.exploded) {
                                    p.stroke(this.colors[0]); // 打ち上げ中は最初の色
                                    p.strokeWeight(3);
                                    p.point(this.x, this.y);
                                } else {
                                    this.particles.forEach(pt => pt.show());
                                }
                            }

                            // 粒を作るときにランダムで色を選ぶ
                            getRandomColor() {
                                return this.colors[p.floor(p.random(this.colors.length))];
                            }

                            createDrop() {
                                const particlesCount = 60;
                                const speed = 2;
                                for (let i = 0; i < particlesCount; i++) {
                                    const angle = (Math.PI * 2 * i) / particlesCount;
                                    const vx = Math.cos(angle) * (speed + p.random(0, 1));
                                    const vy = Math.sin(angle) * (speed + p.random(0, 1));
                                    this.particles.push(new Particle(this.x, this.y, this.getRandomColor(), vx, vy));
                                }
                            }

                            createSmile() {
                                const count = 60;
                                for (let i = 0; i < count; i++) {
                                    const angle = (Math.PI * 2 * i) / count;
                                    const vx = Math.cos(angle) * (2 + p.random(0, 1));
                                    const vy = Math.sin(angle) * (2 + p.random(0, 1));
                                    this.particles.push(new Particle(this.x, this.y, this.getRandomColor(), vx, vy));
                                }
                                this.particles.push(new Particle(this.x - 12, this.y - 10, this.getRandomColor(), 0, 0));
                                this.particles.push(new Particle(this.x + 12, this.y - 10, this.getRandomColor(), 0, 0));
                                const mouthParticles = 20;
                                const mouthOffsetY = 10;
                                for (let i = 0; i < mouthParticles; i++) {
                                    const angle = Math.PI * (i / (mouthParticles - 1));
                                    const vx = Math.cos(angle) * 1.2;
                                    const vy = Math.sin(angle) * 1.2;
                                    this.particles.push(new Particle(this.x, this.y + mouthOffsetY, this.getRandomColor(), vx, vy));
                                }
                            }

                            createPien() {
                                const faceCount = 60;
                                for (let i = 0; i < faceCount; i++) {
                                    const angle = (Math.PI * 2 * i) / faceCount;
                                    const vx = Math.cos(angle) * (2 + p.random(0, 1));
                                    const vy = Math.sin(angle) * (2 + p.random(0, 1));
                                    this.particles.push(new Particle(this.x, this.y, this.getRandomColor(), vx, vy));
                                }
                                this.particles.push(new Particle(this.x - 10, this.y - 5, p.color(0, 0, 0), 0, 0));
                                this.particles.push(new Particle(this.x + 10, this.y - 5, p.color(0, 0, 0), 0, 0));
                                const mouthParticles = 12;
                                for (let i = 0; i < mouthParticles; i++) {
                                    const t = (Math.PI * i) / (mouthParticles - 1);
                                    const vx = Math.cos(t) * 1;
                                    const vy = Math.sin(t) * 0.8 + 1;
                                    this.particles.push(new Particle(this.x, this.y + 12, p.color(0, 0, 0), vx, vy));
                                }
                                this.particles.push(new Particle(this.x - 10, this.y, p.color(0, 0, 255), 0, 1.5));
                                this.particles.push(new Particle(this.x + 10, this.y, p.color(0, 0, 255), 0, 1.5));
                            }

                            createBigCircle() {
                                const particlesCount = p.floor(p.random(80, 150));
                                const radius = p.random(50, 120);
                                for (let i = 0; i < particlesCount; i++) {
                                    const angle = (Math.PI * 2 * i) / particlesCount;
                                    const speed = radius / 25 + p.random(0, 1.5);
                                    this.particles.push(new Particle(this.x, this.y, this.getRandomColor(), Math.cos(angle) * speed, Math.sin(angle) * speed));
                                }
                            }
                        }

                        class Particle {
                            constructor(x, y, color, vx = null, vy = null) {
                                this.x = x;
                                this.y = y;
                                this.vx = vx !== null ? vx : p.random(-2, 2);
                                this.vy = vy !== null ? vy : p.random(-2, 2);
                                this.alpha = 255;
                                this.color = color;
                                this.size = p.random(4, 7);
                                this.gravity = 0.03 + p.random(0, 0.03);
                                this.friction = 0.98 + p.random(-0.01, 0.01);
                            }

                            update() {
                                this.vx *= this.friction;
                                this.vy *= this.friction;
                                this.x += this.vx;
                                this.y += this.vy;
                                this.vy += this.gravity;
                                this.alpha -= 3 + p.random(0, 1);
                            }

                            show() {
                                p.noStroke();
                                p.fill(p.red(this.color), p.green(this.color), p.blue(this.color), this.alpha);
                                p.circle(this.x, this.y, this.size);
                            }
                        }

                        p.setup = () => {
                            const container = document.getElementById("p5-fireworks-bl");
                            const canvas = p.createCanvas(container.clientWidth, container.clientHeight);
                            canvas.parent("p5-fireworks-bl");
                            p.background(0);
                        };

                        p.draw = () => {
                            p.background(0, 0, 0, 25);

                            if (p.random(1) < 0.1) {
                                const r = p.random();
                                let type;
                                if (r < 0.25) type = "drop";
                                else if (r < 0.5) type = "smile";
                                else if (r < 0.75) type = "pien";
                                else type = "bigCircle";
                                fireworks.push(new Firework(type));
                            }

                            fireworks.forEach(f => {
                                f.update();
                                f.show();
                            });

                            fireworks = fireworks.filter(f => f.particles.length > 0 || !f.exploded);
                        };
                    }, "p5-fireworks-bl");
                })();
            </script>
        </div>
        <div class="pane" id="bottom-left">
            <!-- 左下 ここから -->
          <div class="pane" id="bottom-left">
  <h2>今月のカレンダー</h2>
  <table id="calendar"></table>
</div>

<style>
.pane#bottom-left {
  flex: 1 1 300px;
  max-width: 600px;
  background: white;
  padding: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  border-radius: 6px;
}

#calendar {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
}

#calendar th, #calendar td {
  padding: 5px;
  border: 1px solid #ccc;
}

#calendar th {
  background-color: #f0f0f0;
}

#calendar td.holiday {
  color: red;
  font-weight: bold;
}

#calendar td.saturday {
  color: blue;
  font-weight: bold;
}
</style>

<script>
// 固定祝日
const fixedHolidays = [
  {month:1, day:1},   // 元旦
  {month:2, day:11},  // 建国記念の日
  {month:2, day:23},  // 天皇誕生日
  {month:4, day:29},  // 昭和の日
  {month:5, day:3},   // 憲法記念日
  {month:5, day:4},   // みどりの日
  {month:5, day:5},   // こどもの日
  {month:11, day:3},  // 文化の日
  {month:11, day:23}  // 勤労感謝の日
];

// 春分の日・秋分の日を簡易計算
function getShunbun(year) {
  return Math.floor(20.8431 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
}
function getShubun(year) {
  return Math.floor(23.2488 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
}

// 日曜・土曜・祝日を判定
function getHolidayClass(date) {
  const y = date.getFullYear();
  const m = date.getMonth() + 1;
  const d = date.getDate();

  // 春分・秋分の日
  if ((m === 3 && d === getShunbun(y)) || (m === 9 && d === getShubun(y))) return 'holiday';

  // 固定祝日
  if (fixedHolidays.some(h => h.month === m && h.day === d)) return 'holiday';

  // 土曜・日曜
  if (date.getDay() === 0) return 'holiday'; // 日曜赤
  if (date.getDay() === 6) return 'saturday'; // 土曜青

  return '';
}

function generateCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const calendar = document.getElementById("calendar");

  const days = ["日","月","火","水","木","金","土"];
  let html = "<tr>" + days.map(d => `<th>${d}</th>`).join("") + "</tr>";

  let dayCount = 1;
  let weekDay = firstDay.getDay();

  while (dayCount <= lastDay.getDate()) {
    html += "<tr>";
    for (let i = 0; i < 7; i++) {
      if ((dayCount === 1 && i < weekDay) || dayCount > lastDay.getDate()) {
        html += "<td></td>";
      } else {
        const date = new Date(year, month, dayCount);
        const cls = getHolidayClass(date);
        html += `<td class="${cls}">${dayCount}</td>`;
        dayCount++;
      }
    }
    html += "</tr>";
  }

  calendar.innerHTML = html;
}

generateCalendar();
</script>
            <!-- 左下 ここまで -->
        </div>
        <div class="pane" id="bottom-right">
            <!-- 右下 ここから -->
            <h2>右下</h2>
            hanabisyokunin
            <!-- 右下 ここまで -->
