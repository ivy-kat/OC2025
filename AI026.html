<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4分割テンプレート</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            font-family: sans-serif;
        }

        .container {
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 50% 50%;
            width: 100vw;
            height: 100vh;
        }

        .pane {
            border: 1px solid #ccc;
            box-sizing: border-box;
            overflow: auto;
            padding: 10px;
        }

        .pane iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, auto);
                /* 各行の高さは自動調整 */
                min-height: 50vh;
                /* ビューポート高さの50%を最低確保 */
                height: auto;
                /* 内容に応じて伸びる */
            }
        }

        /* パネルごとの背景色 */
        #top-left {
            background-color: #fce4ec;
        }

        #top-right {
            background-color: #e3f2fd;
        }

        #bottom-left {
            background-color: #e8f5e9;
        }

        #bottom-right {
            background-color: #fff3e0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="pane" id="top-left">
            <!-- 左上 ここから -->
            <h2>ミニゲーム：クリックで得点</h2>
<div id="game1"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script>
let score = 0;
let target;

new p5((p) => {
    p.setup = () => {
        const container = document.getElementById("game1");
        let canvas = p.createCanvas(container.clientWidth, 200);
        canvas.parent("game1");

        target = {
            x: p.random(50, p.width - 50),
            y: p.random(50, 150),
            r: 30
        };
    };

    p.draw = () => {
        p.background(240);

        // ターゲット
        p.fill(255, 100, 100);
        p.circle(target.x, target.y, target.r * 2);

        // スコア表示
        p.fill(0);
        p.textSize(16);
        p.text("Score: " + score, 10, 20);
    };

    p.mousePressed = () => {
        let d = p.dist(p.mouseX, p.mouseY, target.x, target.y);
        if (d < target.r) {
            score++;
            target.x = p.random(50, p.width - 50);
            target.y = p.random(50, 150);
        }
    };
});
</script>
            <!-- 左上 ここまで -->
        </div>
        <div class="pane" id="top-right">
            <!-- 右上 ここから -->
       <h2>ミニゲーム：最強ボスバトル</h2>
<!-- 右下パネル内に差し込む -->
<div id="game2" style="width:100%; height:100%; overflow:hidden;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script>
new p5((p) => {

    // 仮想解像度（動ける範囲を広く）
    let baseW = 1200;
    let baseH = 900;

    let player, bullets = [], playerBullets = [];
    let boss;
    let life = 3;
    let gameOver = false;
    let frameCountSurvive = 0;
    let score = 0;

    // setup
    p.setup = () => {
        const container = document.getElementById("game2");
        let canvas = p.createCanvas(container.clientWidth, container.clientHeight);
        canvas.parent("game2");

        window.addEventListener("resize", () => {
            p.resizeCanvas(container.clientWidth, container.clientHeight);
        });

        resetGame();
    };

    function resetGame() {
        player = { x: baseW / 2, y: baseH - 60, r: 12 };
        bullets = [];
        playerBullets = [];
        score = 0;
        life = 3;
        gameOver = false;
        frameCountSurvive = 0;

        boss = {
            x: baseW / 2,
            y: 100,
            r: 35,
            hp: 120,
            maxHp: 120,
            dir: 1,
            phase: 1
        };
    }

    // 攻撃パターン
    function shootCircle(speed = 3, count = 12) {
        for (let i = 0; i < count; i++) {
            let angle = (p.TWO_PI / count) * i;
            bullets.push({
                x: boss.x,
                y: boss.y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                r: 6
            });
        }
    }

    function shootAim() {
        let angle = p.atan2(player.y - boss.y, player.x - boss.x);
        bullets.push({
            x: boss.x,
            y: boss.y,
            vx: Math.cos(angle) * 5,
            vy: Math.sin(angle) * 5,
            r: 8
        });
    }

    function shootSpiral() {
        let t = frameCountSurvive * 0.1;
        bullets.push({
            x: boss.x,
            y: boss.y,
            vx: Math.cos(t) * 3,
            vy: Math.sin(t) * 3,
            r: 6
        });
    }

    function shootLaser() {
        bullets.push({
            x: boss.x,
            y: boss.y,
            vx: 0,
            vy: 8,
            r: 12,
            laser: true
        });
    }

    p.draw = () => {
        
        p.background(10);

        if (gameOver) {
            p.fill(255);
            p.textAlign(p.CENTER, p.CENTER);
            p.textSize(22);
            p.text("GAME OVER\nClick to Restart", p.width/2, p.height/2);
            return;
        }

        frameCountSurvive++;

        // キャンバスに合わせた縮小
        let scaleX = p.width / baseW;
        let scaleY = p.height / baseH;
        p.scale(scaleX, scaleY);

        // プレイヤー
        player.x = p.constrain(p.mouseX / scaleX, player.r, baseW - player.r);
        player.y = p.constrain(p.mouseY / scaleY, player.r, baseH - player.r);
        p.fill(100,200,255);
        p.circle(player.x, player.y, player.r*2);

        // フェーズ判定
        if (boss.hp < boss.maxHp * 0.66) boss.phase = 2;
        if (boss.hp < boss.maxHp * 0.33) boss.phase = 3;

        // ボス移動
        boss.x += boss.dir * (boss.phase===3?4:2);
        if(boss.x<40 || boss.x>baseW-40) boss.dir*=-1;

        // ボス描画
        p.fill(200,80,255);
        p.circle(boss.x,boss.y,boss.r*2);

        // ボス攻撃
        if(frameCountSurvive%60===0) shootCircle(3,boss.phase*6);
        if(frameCountSurvive%40===0) shootAim();
        if(boss.phase>=2 && frameCountSurvive%10===0) shootSpiral();
        if(boss.phase===3 && frameCountSurvive%80===0) shootLaser();

        // 敵弾
        for(let i=bullets.length-1;i>=0;i--){
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;

            p.fill(b.laser?255:255, b.laser?255:80,80);
            p.circle(b.x,b.y,b.r*2);

            let d = p.dist(player.x,player.y,b.x,b.y);
            if(d<player.r+b.r){
                bullets.splice(i,1);
                life--;
                if(life<=0) gameOver=true;
                continue;
            }

            if(b.y>baseH+20 || b.x<-20 || b.x>baseW+20){
                bullets.splice(i,1);
            }
        }

        // プレイヤー弾
        p.fill(80,255,120);
        for(let i=playerBullets.length-1;i>=0;i--){
            let b = playerBullets[i];
            b.y-=7;
            p.circle(b.x,b.y,6);

            let d = p.dist(b.x,b.y,boss.x,boss.y);
            if(d<boss.r){
                boss.hp--;
                playerBullets.splice(i,1);
                continue;
            }

            if(b.y<-10) playerBullets.splice(i,1);
        }
        
        // マウスを押しているか管理
        let isMousePressed = false;
        let shootInterval = 5; // 何フレームごとに1発
        let shootCounter = 0;
        
        // HPバー
        p.fill(255);
        p.rect(baseW-110,10,100,10);
        p.fill(255,0,0);
        p.rect(baseW-110,10,(boss.hp/boss.maxHp)*100,10);

        // UI
        p.fill(255);
        p.textSize(14);
        p.text("Life: "+life,10,20);

        // 勝利判定
        if(boss.hp<=0){
            p.fill(255);
            p.textAlign(p.CENTER,p.CENTER);
            p.textSize(24);
            p.text("YOU WIN!",baseW/2,baseH/2);
            p.noLoop();
        }
    };

    // マウスクリックで攻撃
    p.mousePressed = () => {
        if(gameOver){
            resetGame();
            return;
        }

        playerBullets.push({x:player.x,y:player.y});
    };

});
</script>
            <!-- 右上 ここまで -->
        </div>
        <div class="pane" id="bottom-left">
            <!-- 左下 ここから -->
             𠮷澤衛
            <!-- 左下 ここまで -->
        </div>
        <div class="pane" id="bottom-right">
            <!-- 右下 ここから -->
            <div id="bottom-right">
    <h3>ToDoリスト</h3>
    <input type="text" id="todoInput" placeholder="タスクを入力" style="width:70%;">
    <button id="addBtn">追加</button>
    <ul id="todoList" style="list-style:none; padding-left:0; margin-top:10px; max-height:85%; overflow-y:auto;"></ul>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script>
    $(function(){

    function addTask(taskText){
        if(taskText.trim() === "") return;

        let li = $('<li></li>');
        let checkbox = $('<input type="checkbox">').css('margin-right','8px');
        let span = $('<span></span>').text(taskText);
        let delBtn = $('<button>削除</button>').css({'margin-left':'10px','font-size':'0.8em'});

        delBtn.click(function(){
            li.remove();
        });

        checkbox.change(function(){
            if(this.checked){
                span.css('text-decoration','line-through');
            }else{
                span.css('text-decoration','none');
            }
        });

        li.append(checkbox).append(span).append(delBtn);
        $('#todoList').append(li);
    }

    $('#addBtn').click(function(){
        let val = $('#todoInput').val();
        addTask(val);
        $('#todoInput').val('').focus();
    });

    $('#todoInput').keypress(function(e){
        if(e.which === 13){
            $('#addBtn').click();
        }
    });

});

</script>
            <!-- 右下 ここまで -->
        </div>
    </div>
</body>

</html>
