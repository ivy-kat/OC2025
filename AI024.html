<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4分割テンプレート</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            font-family: sans-serif;
        }

        .container {
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 50% 50%;
            width: 100vw;
            height: 100vh;
        }

        .pane {
            border: 1px solid #ccc;
            box-sizing: border-box;
            overflow: auto;
            padding: 10px;
        }

        .pane iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, auto);
                /* 各行の高さは自動調整 */
                min-height: 50vh;
                /* ビューポート高さの50%を最低確保 */
                height: auto;
                /* 内容に応じて伸びる */
            }
        }

        /* パネルごとの背景色 */
        #top-left {
            background-color: #fce4ec;
        }

        #top-right {
            background-color: #e3f2fd;
        }

        #bottom-left {
            background-color: #e8f5e9;
        }

        #bottom-right {
            background-color: #fff3e0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="pane" id="top-left">
            <!-- 左上 ここから -->
            <h2>おみくじ</h2>
<div id="omikuji"></div>
<button onclick="drawFortune()">引く！</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script>
let result = "ボタンを押してね";

function setup() {
    let canvas = createCanvas(200, 200);
    canvas.parent("omikuji");
    textAlign(CENTER, CENTER);
    textSize(24);
}

function draw() {
    background(255);
    fill(0);
    text(result, width / 2, height / 2);
}

function drawFortune() {
    const fortunes = ["大吉", "中吉", "小吉", "吉", "凶"];
    result = random(fortunes);
}
</script>
            <!-- 左上 ここまで -->
        </div>
        <div class="pane" id="top-right">
            <!-- 右上 ここから -->
            <h2>九州の天気（今日・明日）</h2>
<div id="weather">読み込み中...</div>
<p style="font-size: 12px;">出典：気象庁</p>

<script>
async function loadWeather() {
    try {
        // 気象庁JSON（福岡＝九州北部代表）
        const res = await fetch("https://www.jma.go.jp/bosai/forecast/data/forecast/400000.json");
        const data = await res.json();

        const timeSeries = data[0].timeSeries;

        // 今日・明日
        const dates = timeSeries[0].timeDefines.slice(0, 2);
        const areas = timeSeries[0].areas;

        let html = "";

        areas.forEach(area => {
            html += `<strong>${area.area.name}</strong><br>`;
            html += `今日：${area.weathers[0]}<br>`;
            html += `明日：${area.weathers[1]}<br><br>`;
        });

        document.getElementById("weather").innerHTML = html;

    } catch (e) {
        document.getElementById("weather").innerText = "天気情報の取得に失敗しました";
    }
}

loadWeather();
</script>
            <!-- 右上 ここまで -->
        </div>
        <div class="pane" id="bottom-left">
            <!-- 左下 ここから -->
        <h2>今月のカレンダー</h2>
<div id="calendar"></div>

<script>
// 日本の祝日API
async function getHolidays(year) {
    const res = await fetch(`https://holidays-jp.github.io/api/v1/${year}/date.json`);
    return await res.json();
}

async function generateCalendar() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const holidays = await getHolidays(year);

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    let html = "<table border='1' style='border-collapse:collapse; width:100%; text-align:center;'>";
    html += "<tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr><tr>";

    // 空白
    for (let i = 0; i < firstDay; i++) {
        html += "<td></td>";
    }

    for (let day = 1; day <= lastDate; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const weekDay = new Date(year, month, day).getDay();

        let color = "black";

        // 日曜 or 祝日 → 赤
        if (weekDay === 0 || holidays[dateStr]) {
            color = "red";
        }

        html += `<td style="color:${color}">${day}</td>`;

        if (weekDay === 6) {
            html += "</tr><tr>";
        }
    }

    html += "</tr></table>";

    document.getElementById("calendar").innerHTML = html;
}

generateCalendar();
</script>
            <!-- 左下 ここまで -->
        </div>
        <div class="pane" id="bottom-right">
            <!-- 右下 ここから -->
            今村
            <!-- 右下 ここまで -->
        </div>
    </div>
</body>

</html>
